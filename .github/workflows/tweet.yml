name: Tweet

on:
  schedule:
    # 朝枠: 08:00 JST = 23:00 UTC (前日)
    - cron: '0 23 * * *'
    # 昼枠: 12:00 JST = 03:00 UTC
    - cron: '0 3 * * *'
    # 夜枠: 20:00 JST = 11:00 UTC
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン（X投稿・ログ保存しない）'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      content_type:
        description: 'コンテンツタイプ指定（空欄でランダム）'
        required: false
        default: ''
        type: choice
        options: ['', 'aruaru', 'tips', 'article_intro', 'site_lead', 'quiz']

permissions:
  contents: write   # posted_log.json を git push するために必要

jobs:
  tweet:
    runs-on: ubuntu-latest
    timeout-minutes: 100   # ランダム遅延（最大90分）+ 処理時間を考慮

    steps:
      - name: ランダム遅延（bot検知防止）
        # 手動実行(workflow_dispatch)のときは遅延なし
        if: ${{ github.event_name == 'schedule' }}
        run: |
          DELAY=$((RANDOM % 5400))   # 0〜90分（秒換算）
          echo "待機時間: $((DELAY / 60))分 $((DELAY % 60))秒"
          sleep $DELAY

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest log
        run: git pull --rebase origin main

      - name: Run poster
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry"
          fi
          if [ -n "${{ github.event.inputs.content_type }}" ]; then
            ARGS="$ARGS --type ${{ github.event.inputs.content_type }}"
          fi
          python poster.py $ARGS
        env:
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL:              ${{ secrets.SITE_URL }}

      - name: Commit & push log
        # ドライランのときはスキップ
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git add posted_log.json
          git diff --staged --quiet || git commit -m "log: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin main
